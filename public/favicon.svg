<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Rounded-square off-white tile matching the in-page cat-mark treatment -->
  <rect width="32" height="32" rx="7" fill="#fafafa"/>

  <!-- Cat face: ears `^ ^`, eyes `•  •`, nose `ㅅ`. Rendered as vector
       paths so it stays sharp at tab-icon sizes. -->
  <g fill="#1a1a1a" stroke="none">
    <!-- Left ear ^ -->
    <path d="M8.5 10 L11 6 L13.5 10 Z"/>
    <!-- Right ear ^ -->
    <path d="M18.5 10 L21 6 L23.5 10 Z"/>
    <!-- Left eye • -->
    <circle cx="11" cy="17" r="1.6"/>
    <!-- Right eye • -->
    <circle cx="21" cy="17" r="1.6"/>
  </g>
  <!-- Nose ㅅ — small angled lines for an ASCII-style face -->
  <g fill="none" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round">
    <path d="M14.5 20.5 L16 18.5"/>
    <path d="M17.5 20.5 L16 18.5"/>
  </g>
</svg>
